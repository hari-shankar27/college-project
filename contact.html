<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    </head>
    <style>
            h1{
        text-align: center;
        animation: slide 1s ease forwards;
    }
    @keyframes slide{
        from{transform: translateY(50px);opacity: 0;}
        to{transform: translateY(0px);opacity: 1;}
    }
   
    .contact{
        width: 100%;
        margin-top: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .contact-info{
        width: 35%;
        height: 450px;
        display: flex;
        border-radius: 5px;
        flex-direction: column;
        background-color: rgb(34, 34, 149);
        box-shadow:0 0 10px gray;
        border-right: 2px solid white;
        font-size: 20px;
    }
     .u{
        text-align: center;
        font-weight: bold;
        color: white;
        font-size: 30px;
    }

    .message{
        border: 1px solid white;
        border-radius: 5px;
        width: 30%;
        justify-content: center;
box-shadow:0 0 10px white;
        display: flex;
  flex-direction: column;
  padding-bottom: 20px;
       
        font-size: 20px;
    }
    .message p{
        text-align: center;
        font-weight: bold;
    }
    .message label{
        margin-top: 15px;
margin-left: 20px;
font-weight: bold;
    }
    .message input{
        padding: 8px;
        border: 3px solid white;
        width: 80%;
        border-radius: 5px;
        margin-left: 20px;
    }
    .message input::placeholder,textarea::placeholder{
        font-weight:600;
    }
    textarea{
        padding: 10px;
        width: 80%;
        border-radius: 5px;
        margin-left: 20px;
    }

    .sub{
        width:30%;
      border: none;
      padding: 10px;
      background-color: rgb(182, 80, 80);
      color: white;
      display: block;
      margin: auto;
      border-radius: 5px;
      font-weight: bold;

        margin-top: 20px;
        transition: 0.9s;
    }
    .sub:hover{
        background-color: black;
    }
  .address{
    color: white;
    display: flex;
    gap: 20px;
    margin-top: 20px;
    margin-left: 30px;
  }
  .address i{
    color: black;
  }
    .f{
color: white;
margin-left: 30px;
  }

  .iii{
    font-size: 50px;
    display: flex;
    gap: 30px;
    margin-left: 30px;
  }
     .iii a{
        text-decoration: none;
        color: white;
     } 

    </style>

<body style="background-color: gainsboro;">
    <div id="nav"></div>
    <h1>Contact Us</h1>
    <div class="contact">
        
        <div class="contact-info">
<p class="u">Contact Us</p>
<div class="address"> <i class="fa-solid fa-location-dot"></i>Address: Biratnagar, Nepal</div>
<div class="address"> <i class="fa-solid fa-phone"></i>Phone: 9812345678, 9898765432</div>
<div class="address"> <i class="fa-solid fa-envelope"></i>punamkarki12@gmail.com</div><br>

<p class="f">Follow Us At:</p>
<div class="iii">

<a href="https://www.facebook.com"> <i class=" fa-brands fa-facebook"></i></a>
<a href="https://www.instagram.com"><i class="fa-brands fa-instagram"></i></a>
<a href="https://www.youtube.com"><i class="fa-brands fa-youtube"></i></a>

</div>


</div>

        
        <div class="message">
            <p>Send Us Message</p>
<label for="name">Name:</label>
<input type="text" name="name" placeholder="Name">
<label for="email">Email:</label>
<input type="email" name="email" placeholder="Email">
<label for="subject">Subject:</label>
<input type="text" name="subject" placeholder="Subject">
<label for="message">Message:</label>
<textarea name="message" placeholder="Message"></textarea>

<button class="sub" type="submit">Send Message</button>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
