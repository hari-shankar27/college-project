color: black;

        display: flex;

} 

    .navbar a{
        color: black;

    }

    }
    .auth{
        display: flex;
        gap: 15px;
    }
    .auth a{
        color: black;
        text-decoration: none;
        font-size: 15px;
    }
    .login{
        transition-duration: 0.4s;
    }
    .signup{
        margin-right: 5px;
        transition-duration: 0.4s;
    }
    .login:hover{
        padding: 5px 10px;

    color: white;
    border-radius: 5px;
    }

    .cart{

        border: none;

        transition-duration: 0.4s;
    }
    .cart:hover{
        padding: 5px 10px;
        margin: 3px;
        background-color: black;
        color: white;

    }
    .categories{
        display: flex;
padding: 15px;
justify-content: space-between;
padding-bottom: 2px;
        background-color: whitesmoke;
        color: black;
    }
  
    .choice{
        display: flex;
        margin-inline: auto;
        gap:20px;
    }
   .choice a{
    color: black;
    text-decoration: none;
    font-size: 15px;
    font-weight: bold;
    transition: 0.3s;

   }
  .choice a.active{
    border-bottom: 3px solid black;
  }
   .drop{
    width: 120px;
    height: 25px;
    display: flex;
    align-items: center;
    font-weight: bold;
    transition-duration: 0.4s;
    background-color: black;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
   }
  
   .drop i{
margin-left: 30px;
   }
 

     

</style>
